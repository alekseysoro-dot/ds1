services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: priceparser
      POSTGRES_USER: priceparser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priceparser"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://priceparser:${POSTGRES_PASSWORD}@db:5432/priceparser
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - default
      - core-net

volumes:
  postgres_data:

networks:
  core-net:
    external: true
    name: core-stack_core-net
